<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Peek</title>
  <link href="styles/generated.css" rel="stylesheet">
  <link href="styles/main.css" rel="stylesheet">
  <style>
    :root {
      --font-mono: 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body { font-family: var(--font-sans); }
    .font-mono { font-family: var(--font-mono); }
  </style>
</head>
<body class="bg-primary text-primary min-h-screen overflow-x-hidden">
  <div id="app" class="flex flex-col h-full" role="application" aria-label="Code Peek CSS Inspector">

    <!-- Header -->
    <!-- Header -->
    <header class="h-[64px] flex items-center justify-between px-5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950/80 backdrop-blur-xl sticky top-0 z-40" role="banner">
      <div class="flex items-center gap-3">
        <h1 class="text-[15px] font-black bg-gradient-to-r from-brand-600 to-brand-400 bg-clip-text text-transparent uppercase tracking-tighter">Code Peek</h1>
      </div>

      <div class="flex items-center gap-2">
        <button
          id="inspect-toggle"
          class="flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-50 dark:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-900 dark:text-white transition-all border border-slate-200 dark:border-slate-700 group shadow-sm active:scale-95"
          title="Toggle Inspect Mode (Alt+I)"
        >
          <div class="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-600 transition-all shadow-glow"></div>
          <span class="text-[10px] font-black uppercase tracking-widest">Inspect</span>
        </button>
        
        <div class="relative">
          <button id="menu-toggle" class="p-2 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all active:scale-90">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
          </button>
          
           <!-- Hidden Menu -->
           <div id="utility-menu" class="hidden absolute right-0 top-full mt-2 w-56 bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 py-1.5 z-50 animate-in fade-in slide-in-from-top-2">
             <button id="dark-mode-toggle" class="w-full flex items-center justify-between px-4 py-2.5 text-xs font-black text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-left uppercase tracking-widest">
               <span>Dark Mode</span>
               <div class="w-9 h-5 bg-slate-200 dark:bg-slate-700 rounded-full relative transition-colors" id="dark-mode-track">
                 <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow-sm transition-transform" id="dark-mode-thumb"></div>
               </div>
             </button>
             <div class="h-px bg-slate-100 dark:bg-slate-800 my-1.5 mx-2"></div>
             
             <button class="w-full flex items-center justify-between px-4 py-2.5 text-xs font-black text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-left uppercase tracking-widest cursor-pointer" id="continuous-inspect-toggle">
               <span>Continuously Inspect</span>
               <div class="w-9 h-5 bg-slate-200 dark:bg-slate-700 rounded-full relative transition-colors" id="continuous-track">
                 <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow-sm transition-transform" id="continuous-thumb"></div>
               </div>
             </button>
             
             <div class="h-px bg-slate-100 dark:bg-slate-800 my-1.5 mx-2"></div>
             <button class="w-full px-4 py-2.5 text-xs font-black text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-left uppercase tracking-widest" id="reload-extension-btn">Reload Extension</button>
             <button class="w-full px-4 py-2.5 text-xs font-black text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-left uppercase tracking-widest" id="screenshot-btn">Full Screenshot</button>
             <button class="w-full px-4 py-2.5 text-xs font-black text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-left uppercase tracking-widest" id="export-all-btn">Export Config</button>
           </div>
        </div>

        <button id="close-sidepanel" class="p-2 text-slate-400 hover:text-red-500 rounded-xl hover:bg-red-50 dark:hover:bg-red-950/30 transition-all active:scale-90">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-[80px] scroll-smooth" role="main">
      <!-- Overview Tab -->
      <div id="tab-overview" class="tab-content p-4" role="tabpanel">
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm group hover:border-brand-100 transition-colors">
              <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Stylesheets</div>
              <div id="css-stats-files" class="text-2xl font-black text-slate-900">-</div>
            </div>
            <div class="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm group hover:border-brand-100 transition-colors">
              <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Load Time</div>
              <div id="css-stats-loadtime" class="text-2xl font-black text-slate-900">-</div>
            </div>
          </div>

          <section class="bg-slate-50/50 border border-slate-100 rounded-2xl p-4">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-brand-400"></span> Stylesheets
            </h2>
            <div id="stylesheets-list" class="space-y-2">
              <div class="flex items-center justify-center py-6 text-slate-400 text-xs">Loading files...</div>
            </div>
          </section>

          <section class="bg-slate-50/50 border border-slate-100 rounded-2xl p-4">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-purple-400"></span> Contrast Report
            </h2>
            <div id="contrast-report" class="space-y-3">
              <div class="flex items-center justify-center py-6 text-slate-400 text-xs text-center">Analyzing contrast...</div>
            </div>
          </section>
        </div>
      </div>

      <!-- Colors Tab -->
      <div id="tab-colors" class="tab-content hidden p-4" role="tabpanel">
      </div>

      <!-- Typography Tab -->
      <div id="tab-typography" class="tab-content hidden p-4" role="tabpanel">
        <div id="typography-content" class="space-y-4"></div>
      </div>

      <!-- Assets Tab -->
      <div id="tab-assets" class="tab-content hidden p-0" role="tabpanel">
        <div id="assets-content" class="w-full"></div>
      </div>

      <!-- Inspect Tab -->
      <div id="tab-inspect" class="tab-content hidden p-4" role="tabpanel">
        <div id="inspect-content"></div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <!-- Bottom Navigation -->
    <nav class="h-[74px] bg-white/95 dark:bg-slate-950/95 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 flex items-center justify-around px-3 fixed bottom-0 left-0 right-0 z-40 transition-colors" id="bottom-nav">
      <button class="nav-button active flex flex-col items-center gap-1 group relative py-2" data-tab="overview">
        <div class="p-2.5 px-5 rounded-2xl group-[.active]:bg-brand-500 group-[.active]:text-white text-slate-400 transition-all hover:bg-slate-100 dark:hover:bg-slate-900 group-[.active]:shadow-lg group-[.active]:shadow-brand-500/20 active:scale-90">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        </div>
      </button>

      <button class="nav-button flex flex-col items-center gap-1 group relative py-2" data-tab="colors">
        <div class="p-2.5 px-5 rounded-2xl group-[.active]:bg-brand-500 group-[.active]:text-white text-slate-400 transition-all hover:bg-slate-100 dark:hover:bg-slate-900 group-[.active]:shadow-lg group-[.active]:shadow-brand-500/20 active:scale-90">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
        </div>
      </button>

      <button class="nav-button flex flex-col items-center gap-1 group relative py-2" data-tab="typography">
        <div class="p-2.5 px-5 rounded-2xl group-[.active]:bg-brand-500 group-[.active]:text-white text-slate-400 transition-all hover:bg-slate-100 dark:hover:bg-slate-900 group-[.active]:shadow-lg group-[.active]:shadow-brand-500/20 active:scale-90">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        </div>
      </button>

      <button class="nav-button flex flex-col items-center gap-1 group relative py-2" data-tab="assets">
        <div class="p-2.5 px-5 rounded-2xl group-[.active]:bg-brand-500 group-[.active]:text-white text-slate-400 transition-all hover:bg-slate-100 dark:hover:bg-slate-900 group-[.active]:shadow-lg group-[.active]:shadow-brand-500/20 active:scale-90">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </div>
      </button>

      <button class="nav-button flex flex-col items-center gap-1 group relative py-2" data-tab="inspect">
        <div class="p-2.5 px-5 rounded-2xl group-[.active]:bg-brand-500 group-[.active]:text-white text-slate-400 transition-all hover:bg-slate-100 dark:hover:bg-slate-900 group-[.active]:shadow-lg group-[.active]:shadow-brand-500/20 active:scale-90">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </div>
      </button>
    </nav>

    <script src="utils/messaging.js?v=2"></script>
    <script src="components/tab-overview.js?v=2"></script>
    <script src="components/tab-colors.js?v=2"></script>
    <script src="components/tab-typography.js?v=2"></script>
    <script src="components/tab-assets.js?v=2"></script>
    <script src="components/element-inspector.js?v=2"></script>
    <script src="app.js?v=2"></script>
  </body>
</html>
