<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Peek</title>
  <!-- Nothing Design System Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="styles/generated.css" rel="stylesheet">
  <link href="styles/main.css" rel="stylesheet">
</head>
<body>
  <div id="app" class="flex flex-col" style="min-height: 100vh;" role="application" aria-label="Code Peek CSS Inspector">

    <!-- Header — Nothing Design -->
    <header class="flex items-center justify-between" style="padding: var(--space-md); border-bottom: 1px solid var(--border); background-color: var(--black);" role="banner">
      <!-- Logo — Pure Typography -->
      <div class="flex items-center gap-md">
        <h1 class="text-display-md" style="font-weight: 700; letter-spacing: -0.03em; color: var(--text-display);">CODE PEEK</h1>
      </div>

      <!-- Mode Toggle — Segmented Control -->
      <div class="segmented-control" role="tablist" aria-label="Mode selection">
        <button class="segment active" id="mode-option-design" data-mode="designer" role="tab" aria-selected="true" aria-controls="tab-content">
          DESIGN
        </button>
        <button class="segment" id="mode-option-dev" data-mode="developer" role="tab" aria-selected="false" aria-controls="tab-content">
          DEV
        </button>
      </div>

      <!-- Header Actions -->
      <div class="flex items-center gap-sm">
        <!-- Inspect Toggle -->
        <button id="inspect-toggle" class="btn-icon" type="button" title="Toggle Inspect Mode" aria-label="Toggle inspect mode" aria-pressed="false">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/>
            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>

        <!-- Menu Toggle -->
        <button id="menu-toggle" class="btn-icon" type="button" title="Menu" aria-label="Open menu" aria-haspopup="true">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <circle cx="12" cy="6" r="1.5"/>
            <circle cx="12" cy="12" r="1.5"/>
            <circle cx="12" cy="18" r="1.5"/>
          </svg>
        </button>

        <!-- Close -->
        <button id="close-sidepanel" class="btn-icon" type="button" title="Close" aria-label="Close panel">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <path d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Utility Menu (Hidden) -->
    <div id="utility-menu" class="hidden" style="position: absolute; right: var(--space-md); top: 60px; z-index: 50; background-color: var(--surface); border: 1px solid var(--border-visible); border-radius: var(--radius-lg); padding: var(--space-sm); min-width: 200px;">
      <!-- Dark Mode Toggle -->
      <div class="flex items-center justify-between" style="padding: var(--space-sm) var(--space-md);">
        <span class="text-label">Dark Mode</span>
        <div class="toggle-track active" id="dark-mode-track" role="switch" aria-checked="true" aria-label="Dark mode" tabindex="0">
          <div class="toggle-thumb" id="dark-mode-thumb"></div>
        </div>
      </div>
      
      <div style="height: 1px; background-color: var(--border); margin: var(--space-xs) 0;"></div>
      
      <!-- Menu Items -->
      <button id="screenshot-btn" type="button" class="btn-ghost" style="width: 100%; justify-content: flex-start; text-align: left;">
        SCREENSHOT
      </button>
      <button id="reload-extension-btn" type="button" class="btn-ghost" style="width: 100%; justify-content: flex-start; text-align: left;">
        RELOAD
      </button>
      <button id="export-all-btn" type="button" class="btn-ghost" style="width: 100%; justify-content: flex-start; text-align: left;">
        EXPORT
      </button>
    </div>

    <!-- Main Content -->
    <main class="flex-1" style="overflow-y: auto; padding-bottom: 60px;" role="main">
      <!-- Overview Tab -->
      <div id="tab-overview" class="tab-content" role="tabpanel" aria-labelledby="tab-overview-btn">
        <div class="space-y-lg">
          <!-- Loading State -->
          <div id="overview-loading" class="flex items-center gap-sm" style="padding: var(--space-xl);">
            <span class="loading-text loading-bracket">LOADING</span>
          </div>
          <!-- Content injected by JS -->
        </div>
      </div>

      <!-- Colors Tab -->
      <div id="tab-colors" class="tab-content hidden" role="tabpanel" aria-labelledby="tab-colors-btn"></div>

      <!-- Typography Tab -->
      <div id="tab-typography" class="tab-content hidden" role="tabpanel" aria-labelledby="tab-typography-btn">
        <div id="typography-content" class="space-y-lg"></div>
      </div>

      <!-- Assets Tab -->
      <div id="tab-assets" class="tab-content hidden" role="tabpanel" aria-labelledby="tab-assets-btn">
        <div id="assets-content"></div>
      </div>

      <!-- Rulers Tab -->
      <div id="tab-rulers" class="tab-content hidden" role="tabpanel" aria-labelledby="tab-rulers-btn">
        <div id="rulers-content" class="space-y-xl"></div>
      </div>

      <!-- Inspect Tab -->
      <div id="tab-inspect" class="tab-content hidden" role="tabpanel" aria-labelledby="tab-inspect-btn">
        <div id="inspect-content"></div>
      </div>

      <!-- Tech Stack Tab (Developer) -->
      <div id="tab-tech-stack" class="tab-content hidden" role="tabpanel" aria-labelledby="tab-tech-stack-btn">
        <div id="tech-stack-content" class="space-y-lg"></div>
      </div>

      <!-- Code Snippets Tab (Developer) -->
      <div id="tab-code-snippets" class="tab-content hidden" role="tabpanel" aria-labelledby="tab-code-snippets-btn">
        <div id="code-snippets-content" class="space-y-lg"></div>
      </div>

      <!-- Audit Tab (Developer) -->
      <div id="tab-audit" class="tab-content hidden" role="tabpanel" aria-labelledby="tab-audit-btn">
        <div id="audit-content" class="space-y-lg"></div>
      </div>
    </main>

    <!-- Bottom Navigation — Nothing Design -->
    <nav class="nav-bar" id="bottom-nav" style="position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;" role="navigation" aria-label="Main navigation">
      <div id="tab-bar" class="flex items-center justify-around w-full"></div>
    </nav>

    <!-- Scripts -->
    <script src="culori.min.js"></script>
    <script src="utils/messaging.js?v=2"></script>
    <script src="utils/og-preview-data.js?v=2"></script>
    <script src="components/modal-component.js?v=2"></script>
    <script src="components/og-preview-modal.js?v=2"></script>
    <script src="components/brand-guide-modal.js?v=2"></script>
    <script src="app.js?v=2"></script>
  </body>
</html>
